name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

# Default: minimal read permissions. Build job overrides to packages: write.
permissions:
  contents: read

# Cancel in-progress runs on the same ref to avoid stale builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: test
  # Runs on every push (main + feature/**) and every PR targeting main.
  # Uses sqlite:///:memory: — no MySQL service required.
  # No dummy env vars required — app has SQLite fallback at import time.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: build-and-push
  # Runs ONLY on push to main (not on PRs, not on feature branches).
  # Requires test to pass first.
  # Pushes a single immutable tag: ghcr.io/<owner>/stock-backtest:<sha7>
  # Rule 10: :latest tag is NEVER created.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Docker build & push (GHCR)
    needs: test
    runs-on: ubuntu-latest
    # Only run on direct pushes to main — skip PRs, feature branches, and
    # promote-merge commits (prevents CI rebuild loop after promote PR merge).
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, 'chore(promote)')

    permissions:
      contents: read
      packages: write  # Required for GHCR push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute SHA7 and lowercase owner
        id: vars
        run: |
          # GHCR image references must be all-lowercase.
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA7=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "sha7=${SHA7}"         >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${OWNER_LC}/stock-backtest:${SHA7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Rule 10: SHA7 tag only — :latest is intentionally omitted.
          tags: ${{ steps.vars.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: promote
  # Runs ONLY on push to main, after test + build-and-push both succeed.
  # Creates a PR that updates image tags in K8s manifests to the new SHA7.
  # Manual merge required — no auto-merge.
  # Rule 10: updates to immutable sha7 tag only.
  # ─────────────────────────────────────────────────────────────────────────────
  promote:
    name: Create GitOps promotion PR
    needs: [test, build-and-push]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, 'chore(promote)')

    concurrency:
      group: promote
      cancel-in-progress: false

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: vars
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA7=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${OWNER_LC}/stock-backtest:${SHA7}"
          echo "sha7=${SHA7}"   >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create promote branch and update manifests
        env:
          SHA7: ${{ steps.vars.outputs.sha7 }}
          IMAGE: ${{ steps.vars.outputs.image }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # -B: create branch or reset if exists (idempotent re-run)
          git checkout -B promote/${SHA7}

          # H2: Two-pass sed — ^ anchor + leading-space capture prevents over-matching.
          # No .*$ suffix: avoids multi-byte locale issues with trailing Korean comments.
          # Trailing comments remain in YAML (harmless); only the value is replaced.
          # Two separate commands because | alternation in pattern would conflict
          # with | used as sed delimiter.

          # Web deployment container image
          sed -i -E "s|^([[:space:]]*)image: stock-web:local|\1image: ${IMAGE}|" k8s/web-deployment.yaml
          sed -i -E "s|^([[:space:]]*)image: ghcr\.io/[^:]+/stock-backtest:[a-f0-9]{7}|\1image: ${IMAGE}|" k8s/web-deployment.yaml

          # Web deployment WORKER_IMAGE env value
          # Advances to the value line after the name anchor; ".*" matches to last quote.
          sed -i '/name: WORKER_IMAGE/{n; s|value: ".*"|value: "'"${IMAGE}"'"|}' k8s/web-deployment.yaml

          # Worker template container image
          # Note: worker-job-template.yaml is excluded from Argo CD sync (directory.exclude).
          # This update is for documentation/consistency only —
          # K8sJobLauncher reads WORKER_IMAGE from the web Pod env, not this template.
          sed -i -E "s|^([[:space:]]*)image: stock-web:local|\1image: ${IMAGE}|" k8s/worker-job-template.yaml
          sed -i -E "s|^([[:space:]]*)image: ghcr\.io/[^:]+/stock-backtest:[a-f0-9]{7}|\1image: ${IMAGE}|" k8s/worker-job-template.yaml

          git add k8s/web-deployment.yaml k8s/worker-job-template.yaml
          git diff --cached --exit-code && echo "No changes to commit" && exit 0

          git commit -m "chore(promote): update image to ${IMAGE}"
          git push origin promote/${SHA7} --force

      - name: Open promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA7: ${{ steps.vars.outputs.sha7 }}
          IMAGE: ${{ steps.vars.outputs.image }}
        run: |
          # Skip if PR already exists for this sha7
          EXISTING=$(gh pr list --head "promote/${SHA7}" --base main \
            --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "${EXISTING}" ]; then
            echo "PR #${EXISTING} already exists for promote/${SHA7} — skipping"
            exit 0
          fi

          # H1: printf keeps every line at block indentation — heredoc body at col-0
          # would escape the YAML block scalar and cause parse errors.
          printf '%s\n' \
            '## GitOps Promotion' \
            '' \
            "**Image:** \`${IMAGE}\`" \
            "**Source commit:** ${{ github.sha }}" \
            '' \
            '### Changes' \
            "- \`k8s/web-deployment.yaml\`: container image + WORKER_IMAGE updated" \
            "- \`k8s/worker-job-template.yaml\`: image updated (consistency; excluded from Argo sync)" \
            '' \
            '> Merge this PR to deploy via Argo CD.' \
            > /tmp/pr-body.md

          gh pr create \
            --title "chore(promote): deploy ${IMAGE}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "promote/${SHA7}"
