name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

# Default: minimal read permissions. Build job overrides to packages: write.
permissions:
  contents: read

# Cancel in-progress runs on the same ref to avoid stale builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: test
  # Runs on every push (main + feature/**) and every PR targeting main.
  # Uses sqlite:///:memory: — no MySQL service required.
  # No dummy env vars required — app has SQLite fallback at import time.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: build-and-push
  # Runs ONLY on push to main (not on PRs, not on feature branches).
  # Requires test to pass first.
  # Pushes a single immutable tag: ghcr.io/<owner>/stock-backtest:<sha7>
  # Rule 10: :latest tag is NEVER created.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Docker build & push (GHCR)
    needs: test
    runs-on: ubuntu-latest
    # Only run on direct pushes to main — skip PRs and feature branches.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write  # Required for GHCR push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute SHA7 and lowercase owner
        id: vars
        run: |
          # GHCR image references must be all-lowercase.
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA7=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "sha7=${SHA7}"         >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${OWNER_LC}/stock-backtest:${SHA7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Rule 10: SHA7 tag only — :latest is intentionally omitted.
          tags: ${{ steps.vars.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
