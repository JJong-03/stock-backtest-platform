apiVersion: batch/v1
kind: Job
metadata:
  name: worker-<run_id_short>
  namespace: stock-backtest
  labels:
    app: worker
    run_id: "<uuid>"
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: worker
        run_id: "<uuid>"
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          # Phase 4에서 GHCR:<git-sha>로 전환 예정
          image: stock-web:local
          imagePullPolicy: IfNotPresent
          command: ["python", "worker.py"]
          envFrom:
            - configMapRef:
                name: web-config
            - secretRef:
                name: web-secret
          env:
            # ⚠️ 이 파일은 참조용 템플릿입니다.
            # 실제 Job은 K8sJobLauncher.launch()가 동적으로 env를 오버라이드합니다.
            # 이 파일을 직접 kubectl apply 하지 마십시오.
            - name: RUN_ID
              value: "<run_id_placeholder>"
            - name: TICKER
              value: "<ticker_placeholder>"
            - name: RULE_TYPE
              value: "<rule_type_placeholder>"
            - name: PARAMS_JSON
              value: "<params_json_placeholder>"
            - name: START_DATE
              value: "<start_date_placeholder>"
            - name: END_DATE
              value: "<end_date_placeholder>"
            - name: INITIAL_CAPITAL
              value: "100000"