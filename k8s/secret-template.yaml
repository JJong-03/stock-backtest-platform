# 비밀번호 및 민감한 정보를 Kubernetes Secret으로 관리하기 위한 템플릿입니다.
# 진짜 비밀번호로 교체하여 사용하세요. 이 파일은 Opaque 타입의 Secret을 생성하며, 웹 애플리케이션과 MySQL 데이터베이스에 필요한 환경 변수를 포함합니다.
# 이후, kubectl apply -f secret.yaml -n $NS 명령어로 Secret을 생성할 수 있습니다.
# secret.yaml 파일은 web-deployment.yaml에서 참조되며, DATABASE_URL과 DB_USER/DB_PASSWORD 환경 변수를 통해 웹 애플리케이션이 MySQL 데이터베이스에 연결할 수 있도록 합니다. 또한, MYSQL_ROOT_PASSWORD, MYSQL_USER, MYSQL_PASSWORD는 MySQL StatefulSet에서 초기화 시 사용됩니다.

apiVersion: v1
kind: Secret
metadata:
  name: web-secret
  namespace: stock-backtest
  labels:
    app: web
    app.kubernetes.io/name: stock-backtest
type: Opaque
stringData:
  # Preferred DB URI (takes precedence over DB_* fallback in app.py)
  DATABASE_URL: "mysql+pymysql://<db_user>:<db_password>@mysql:3306/stock_backtest"

  # Fallback DB credentials
  DB_USER: "<db_user>"
  DB_PASSWORD: "<db_password>"

  # MySQL bootstrap secrets (for mysql-statefulset wiring)
  MYSQL_ROOT_PASSWORD: "<mysql_root_password>"
  MYSQL_USER: "<mysql_app_user>"
  MYSQL_PASSWORD: "<mysql_app_password>"
