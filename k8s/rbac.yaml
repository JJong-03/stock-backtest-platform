apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-sa
  namespace: stock-backtest
  labels:
    app: web
    app.kubernetes.io/name: stock-backtest
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: web-job-manager
  namespace: stock-backtest
  labels:
    app: web
    app.kubernetes.io/name: stock-backtest
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: web-job-manager-binding
  namespace: stock-backtest
  labels:
    app: web
    app.kubernetes.io/name: stock-backtest
subjects:
  - kind: ServiceAccount
    name: web-sa
    namespace: stock-backtest
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: web-job-manager
