apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: stock-backtest
  labels:
    app: web
spec:
  rules:
    - host: stock-backtest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
